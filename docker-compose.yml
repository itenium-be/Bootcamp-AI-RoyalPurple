services:
  postgres:
    image: postgres:17
    container_name: skillforge-db
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge
      POSTGRES_DB: skillforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Itenium.SkillForge/backend
      args:
        NUGET_USER: ${GITHUB_USER}
        NUGET_TOKEN: ${GITHUB_TOKEN}
    container_name: skillforge-backend
    restart: on-failure
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=skillforge;Username=skillforge;Password=skillforge
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Itenium.SkillForge/frontend
      args:
        NPM_TOKEN: ${GITHUB_TOKEN}
    container_name: skillforge-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1280"
