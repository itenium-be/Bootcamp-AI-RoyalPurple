services:
  postgres:
    image: postgres:17
    container_name: skillforge-db
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge
      POSTGRES_DB: skillforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Itenium.SkillForge/backend
      args:
        NUGET_USER: ${NUGET_USER}
        NUGET_TOKEN: ${NUGET_TOKEN}
    container_name: skillforge-backend
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=skillforge;Username=skillforge;Password=skillforge
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Itenium.SkillForge/frontend
    container_name: skillforge-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
