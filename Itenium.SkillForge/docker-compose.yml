services:
  postgres:
    image: postgres:17
    container_name: postgres
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: skillforge
      POSTGRES_DB: skillforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-db.sh:/docker-entrypoint-initdb.d/init-user-db.sh

volumes:
  postgres_data:
